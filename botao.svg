<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg {
      fill: #2496ED;
      stroke: #ffffff;
      stroke-width: 2;
      rx: 12;
    }

    .text {
      fill: white;
      font-family: sans-serif;
      font-weight: bold;
      font-size: 16px;
      pointer-events: none;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .btn {
      animation: pulse 2s infinite;
      transform-origin: 160px 40px;
    }
  </style>

  <g class="btn">
    <rect x="5" y="10" width="310" height="60" rx="12" class="bg" />

    <image
      href="box.png"
      x="20"
      y="20"
      width="40"
      height="40"
      preserveAspectRatio="xMidYMid meet">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -2; 0 0"
        dur="1.6s"
        repeatCount="indefinite" />
    </image>

    <text
      x="185"
      y="40"
      dominant-baseline="middle"
      text-anchor="middle"
      class="text">
      VER REPOSITÓRIOS
    </text>
  </g>
</svg>
