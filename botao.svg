<svg width="200" height="60" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Azul escuro moderno (#112240) na classe .box */
    .box { fill: #112240; stroke: #4F83CC; stroke-width: 2; cursor: pointer; }
    .text { fill: white; font-family: sans-serif; font-weight: bold; font-size: 14px; pointer-events: none; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .btn { animation: pulse 2s infinite; transform-origin: center; }
  </style>
  <g class="btn">
    <rect x="5" y="5" width="190" height="50" rx="10" class="box" />
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text">📦 My Repositories</text>
  </g>
</svg>
