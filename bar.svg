<svg width="100%" height="10" viewBox="0 0 1000 10" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <style>
    @keyframes move-it {
      from { transform: translateX(0); }
      to { transform: translateX(-1000px); } /* Move exatamente uma unidade de ciclo */
    }
    .liquid-line {
      animation: move-it 5s linear infinite; /* 'linear' é essencial para não ter pausa */
    }
  </style>
  <defs>
    <!-- Gradiente calculado para emenda invisível -->
    <linearGradient id="infinito" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000" />
      <stop offset="16.6%" stop-color="#ffff00" />
      <stop offset="33.3%" stop-color="#00ff00" />
      <stop offset="50%" stop-color="#00ffff" />
      <stop offset="66.6%" stop-color="#0000ff" />
      <stop offset="83.3%" stop-color="#ff00ff" />
      <stop offset="100%" stop-color="#ff0000" />
    </linearGradient>
  </defs>

  <g class="liquid-line">
    <rect x="0" y="3" width="1000" height="3" fill="url(#infinito)" />
    <rect x="1000" y="3" width="1000" height="3" fill="url(#infinito)" />
  </g>
</svg>
